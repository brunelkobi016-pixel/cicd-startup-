version: '3.8'

services:
  web:
    build: .
    container_name: startup-web
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://startup:startup123@db:5432/startupdb
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    restart: always

  db:
    image: postgres:15-alpine
    container_name: startup-db
    environment:
      - POSTGRES_USER=startup
      - POSTGRES_PASSWORD=startup123
      - POSTGRES_DB=startupdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: startup-redis
    restart: always

  nginx:
    image: nginx:alpine
    container_name: startup-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    restart: always

volumes:
  postgres_data: